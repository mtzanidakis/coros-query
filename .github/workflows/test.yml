name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - run: go test ./...

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
